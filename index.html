<body>
<!-- === TOUT TON HTML ICI === -->
<div id="toasts"></div>
<!-- ... tout ton HTML existant ... -->

<script>
// === SUPABASE AVEC TES CLÉS ===
const supabaseUrl = "sb_publishable_2CkzzalbdJh5CmPG5udayw_uXb-1jcl";
const supabaseKey = "sb_secret_s3r5cqeVZk--rujIX7YQdA_9hrPdZ0z";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

// === VARIABLES GLOBALES ===
let me = null;
let activeDM = null, activeGrp = null, activeSrv = null, activeCh = null;

// === FONCTION D'INSCRIPTION SIMPLE (SANS EMAILJS) ===
async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const username = document.getElementById('reg-user').value.trim().toLowerCase();
  const name = document.getElementById('reg-name').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const conf = document.getElementById('reg-conf').value;
  const err = document.getElementById('reg-err');
  
  err.style.display = 'none';
  
  // Validations de base
  if (!email || !username || !name || !pass || pass !== conf) {
    err.textContent = 'Vérifie tous les champs';
    err.style.display = 'block';
    return;
  }

  try {
    // Vérifier si le pseudo existe déjà
    const { data: existingUser } = await supabase
      .from('users')
      .select('username')
      .eq('username', username)
      .maybeSingle();

    if (existingUser) {
      err.textContent = 'Ce pseudo est déjà pris';
      err.style.display = 'block';
      return;
    }

    // Vérifier si l'email existe déjà
    const { data: existingEmail } = await supabase
      .from('users')
      .select('email')
      .eq('email', email)
      .maybeSingle();

    if (existingEmail) {
      err.textContent = 'Cet email est déjà utilisé';
      err.style.display = 'block';
      return;
    }

    // Créer l'utilisateur DIRECTEMENT (sans confirmation)
    const newUser = {
      username: username,
      email: email,
      name: name,
      pass: pass,
      bio: '',
      avGrad: Math.floor(Math.random() * 6),
      avatarImg: null,
      avEffect: 'none',
      bannerEff: { type: 'gradient', c1: '#5b7fff', c2: '#c77dff' },
      friends: [],
      incoming: [],
      outgoing: [],
      srvInvites: [],
      servers: [],
      joined: new Date().toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' }),
      created: Date.now()
    };

    const { error } = await supabase
      .from('users')
      .insert([newUser]);

    if (error) throw error;

    toast('✅ Compte créé ! Connecte-toi maintenant', 's');
    
    // Aller directement à la page de connexion
    document.getElementById('c-reg').style.display = 'none';
    document.getElementById('c-log').style.display = '';
    
  } catch (error) {
    console.error('Erreur:', error);
    err.textContent = 'Erreur : ' + error.message;
    err.style.display = 'block';
  }
}

// === FONCTION DE CONNEXION SIMPLE ===
async function doLogin() {
  const username = document.getElementById('log-user').value.trim().toLowerCase();
  const pass = document.getElementById('log-pass').value;
  const err = document.getElementById('log-err');
  
  err.style.display = 'none';

  if (!username || !pass) {
    err.textContent = 'Remplis tous les champs';
    err.style.display = 'block';
    return;
  }

  try {
    const { data: user, error } = await supabase
      .from('users')
      .select('*')
      .eq('username', username)
      .eq('pass', pass)
      .single();

    if (error || !user) {
      err.textContent = 'Pseudo ou mot de passe incorrect';
      err.style.display = 'block';
      return;
    }

    // Connexion réussie
    me = user;
    
    // Cacher auth, montrer app
    document.getElementById('auth-layer').style.display = 'none';
    document.getElementById('app-layer').classList.add('on');
    
    // Afficher le pseudo
    document.getElementById('welcome-txt').textContent = `Bienvenue, ${me.name} !`;
    document.getElementById('my-nm').textContent = me.name;
    document.getElementById('my-usr').textContent = '@' + me.username;
    
    toast(`Connecté en tant que ${me.name}`, 's');
    
  } catch (error) {
    console.error('Erreur:', error);
    err.textContent = 'Erreur de connexion';
    err.style.display = 'block';
  }
}

// === FONCTION POUR AJOUTER UN AMI ===
async function sendFR() {
  const val = document.getElementById('add-fr-inp').value.trim().toLowerCase();
  const res = document.getElementById('fr-res');
  
  if (!val) {
    res.innerHTML = 'Entre un pseudo';
    return;
  }
  
  if (val === me.username) {
    res.innerHTML = 'Tu ne peux pas t\'ajouter toi-même';
    return;
  }

  try {
    // Chercher l'utilisateur
    const { data: target, error } = await supabase
      .from('users')
      .select('*')
      .eq('username', val)
      .single();

    if (error || !target) {
      res.innerHTML = `❌ Utilisateur "${val}" introuvable`;
      return;
    }

    // Vérifier s'il est déjà ami
    if (me.friends?.includes(val)) {
      res.innerHTML = `✅ ${target.name} est déjà ton ami`;
      return;
    }

    // Vérifier si demande déjà envoyée
    if (me.outgoing?.includes(val)) {
      res.innerHTML = `⏳ Demande déjà envoyée à ${target.name}`;
      return;
    }

    // Envoyer la demande
    const newOutgoing = [...(me.outgoing || []), val];
    const newTargetIncoming = [...(target.incoming || []), me.username];

    // Mettre à jour l'expéditeur
    await supabase
      .from('users')
      .update({ outgoing: newOutgoing })
      .eq('username', me.username);

    // Mettre à jour le destinataire
    await supabase
      .from('users')
      .update({ incoming: newTargetIncoming })
      .eq('username', val);

    // Mettre à jour la variable locale
    me.outgoing = newOutgoing;

    res.innerHTML = `📨 Demande envoyée à ${target.name}`;
    document.getElementById('add-fr-inp').value = '';
    toast(`Demande envoyée à ${target.name}`, 's');
    
  } catch (error) {
    console.error('Erreur:', error);
    res.innerHTML = '❌ Erreur';
  }
}

// === FONCTION POUR AFFICHER LA PAGE AMIS ===
async function showFriends() {
  // Récupérer les données à jour
  const { data: current } = await supabase
    .from('users')
    .select('*')
    .eq('username', me.username)
    .single();
  
  me = current;

  const inList = document.getElementById('fr-in-list');
  const outList = document.getElementById('fr-out-list');
  const allList = document.getElementById('fr-all');
  
  inList.innerHTML = '';
  outList.innerHTML = '';
  allList.innerHTML = '';

  // Demandes reçues
  if (me.incoming?.length) {
    document.getElementById('fr-in-sec').style.display = '';
    for (const uid of me.incoming) {
      const { data: u } = await supabase
        .from('users')
        .select('*')
        .eq('username', uid)
        .single();
      
      if (u) {
        inList.innerHTML += `
          <div class="rqitem">
            <div class="sav" style="background:var(--a)">${u.name[0]}</div>
            <div style="flex:1">
              <div style="font-weight:700">${u.name}</div>
              <div style="font-size:11px">@${u.username}</div>
            </div>
            <div class="rqacts">
              <button class="bok" onclick="acceptFR('${uid}')">✓</button>
              <button class="bno" onclick="declineFR('${uid}')">✕</button>
            </div>
          </div>
        `;
      }
    }
  } else {
    document.getElementById('fr-in-sec').style.display = 'none';
  }

  // Demandes envoyées
  if (me.outgoing?.length) {
    document.getElementById('fr-out-sec').style.display = '';
    for (const uid of me.outgoing) {
      const { data: u } = await supabase
        .from('users')
        .select('*')
        .eq('username', uid)
        .single();
      
      if (u) {
        outList.innerHTML += `
          <div class="rqitem">
            <div class="sav" style="background:var(--a)">${u.name[0]}</div>
            <div style="flex:1">
              <div style="font-weight:700">${u.name}</div>
              <div style="font-size:11px">@${u.username}</div>
            </div>
            <button class="bno" onclick="cancelFR('${uid}')">Annuler</button>
          </div>
        `;
      }
    }
  } else {
    document.getElementById('fr-out-sec').style.display = 'none';
  }

  // Amis
  if (me.friends?.length) {
    for (const uid of me.friends) {
      const { data: u } = await supabase
        .from('users')
        .select('*')
        .eq('username', uid)
        .single();
      
      if (u) {
        allList.innerHTML += `
          <div class="si" onclick="openDM('${uid}')">
            <div class="sav" style="background:var(--a)">${u.name[0]}</div>
            <div class="sinfo">
              <div class="snm">${u.name}</div>
              <div class="ssub">@${u.username}</div>
            </div>
            <button class="btns" onclick="event.stopPropagation();openDM('${uid}')">💬</button>
          </div>
        `;
      }
    }
  } else {
    allList.innerHTML = '<div style="color:var(--t2)">Aucun ami pour l\'instant</div>';
  }
}

// === FONCTION POUR ACCEPTER UNE DEMANDE ===
async function acceptFR(uid) {
  try {
    // Récupérer les infos de l'autre
    const { data: target } = await supabase
      .from('users')
      .select('*')
      .eq('username', uid)
      .single();

    // Mettre à jour mes listes
    const newFriends = [...(me.friends || []), uid];
    const newIncoming = (me.incoming || []).filter(x => x !== uid);
    
    await supabase
      .from('users')
      .update({ 
        friends: newFriends,
        incoming: newIncoming 
      })
      .eq('username', me.username);

    // Mettre à jour les listes de l'autre
    const newTargetFriends = [...(target.friends || []), me.username];
    const newTargetOutgoing = (target.outgoing || []).filter(x => x !== me.username);
    
    await supabase
      .from('users')
      .update({ 
        friends: newTargetFriends,
        outgoing: newTargetOutgoing 
      })
      .eq('username', uid);

    // Mettre à jour la variable locale
    me.friends = newFriends;
    me.incoming = newIncoming;

    showFriends();
    toast(`🎉 Ami ajouté !`, 's');
    
  } catch (error) {
    console.error('Erreur:', error);
  }
}

// === FONCTION POUR REFUSER/ANNULER ===
async function declineFR(uid) {
  me.incoming = (me.incoming || []).filter(x => x !== uid);
  
  await supabase
    .from('users')
    .update({ incoming: me.incoming })
    .eq('username', me.username);
  
  showFriends();
}

async function cancelFR(uid) {
  me.outgoing = (me.outgoing || []).filter(x => x !== uid);
  
  await supabase
    .from('users')
    .update({ outgoing: me.outgoing })
    .eq('username', me.username);
  
  const { data: target } = await supabase
    .from('users')
    .select('incoming')
    .eq('username', uid)
    .single();
  
  const newTargetIncoming = (target.incoming || []).filter(x => x !== me.username);
  
  await supabase
    .from('users')
    .update({ incoming: newTargetIncoming })
    .eq('username', uid);
  
  showFriends();
}

// === FONCTIONS DE NAVIGATION ===
function showAuth(page) {
  document.getElementById('c-reg').style.display = page === 'register' ? '' : 'none';
  document.getElementById('c-log').style.display = page === 'login' ? '' : 'none';
}

function navTo(page) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  
  if (page === 'friends') {
    document.getElementById('view-friends').classList.add('on');
    showFriends();
  }
  if (page === 'profile') {
    document.getElementById('view-profile').classList.add('on');
  }
  if (page === 'settings') {
    document.getElementById('view-settings').classList.add('on');
  }
  if (page === 'home') {
    document.getElementById('view-home').classList.add('on');
  }
}

function openDM(uid) {
  activeDM = uid;
  document.getElementById('view-dm').classList.add('on');
  document.getElementById('dm-hd-nm').textContent = uid;
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type === 's' ? '✅' : '💬'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Initialisation
document.addEventListener('DOMContentLoaded', () => {
  showAuth('login');
});
</script>
</body>
